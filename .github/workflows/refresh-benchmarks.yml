name: Refresh Benchmarks

on:
  schedule:
    - cron: "0 6 * * 0"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: zeroapi-refresh-benchmarks
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      AA_API_KEY: ${{ secrets.AA_API_KEY }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"

      - name: Skip when AA API key is not configured
        if: ${{ env.AA_API_KEY == '' }}
        run: echo "AA_API_KEY secret is not configured. Skipping weekly benchmark refresh."

      - name: Refresh benchmarks snapshot
        if: ${{ env.AA_API_KEY != '' }}
        run: python3 scripts/refresh_benchmarks.py

      - name: Detect benchmark changes
        if: ${{ env.AA_API_KEY != '' }}
        id: diff
        run: |
          if git diff --quiet -- benchmarks.json; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit refreshed benchmarks
        if: ${{ env.AA_API_KEY != '' && steps.diff.outputs.changed == 'true' }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add benchmarks.json
          git commit -m "chore(data): refresh benchmarks snapshot"
          git push
