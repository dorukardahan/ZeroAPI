name: Publish ClawHub Plugin

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: zeroapi-publish-clawhub-plugin
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    env:
      CLAWHUB_TOKEN: ${{ secrets.CLAWHUB_TOKEN }}
      CLAWHUB_CLI_VERSION: "0.12.2"
      OPENCLAW_VERIFY_VERSION: "2026.5.2"
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: "22"

      - name: Read package version
        id: version
        run: |
          VERSION="$(node -p "require('./plugin/package.json').version")"
          echo "value=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Stage runtime plugin package
        run: node scripts/stage_clawhub_plugin.mjs .tmp-clawhub-plugin

      - name: Skip when ClawHub token is not configured
        if: ${{ env.CLAWHUB_TOKEN == '' }}
        run: echo "CLAWHUB_TOKEN secret is not configured. Skipping ClawHub plugin publish."

      - name: Publish plugin package
        if: ${{ env.CLAWHUB_TOKEN != '' }}
        run: |
          npx --yes "clawhub@$CLAWHUB_CLI_VERSION" login --token "$CLAWHUB_TOKEN" --no-browser
          npx --yes "clawhub@$CLAWHUB_CLI_VERSION" package publish .tmp-clawhub-plugin \
            --family code-plugin \
            --name zeroapi \
            --display-name "ZeroAPI Router" \
            --version "${{ steps.version.outputs.value }}" \
            --changelog "Publish ZeroAPI ${{ steps.version.outputs.value }}" \
            --source-repo dorukardahan/ZeroAPI \
            --source-commit "$GITHUB_SHA" \
            --source-ref "$GITHUB_REF_NAME" \
            --source-path "plugin"

      - name: Verify ClawHub package is downloadable
        if: ${{ env.CLAWHUB_TOKEN != '' }}
        run: |
          npx --yes "clawhub@$CLAWHUB_CLI_VERSION" package inspect zeroapi --version "${{ steps.version.outputs.value }}" --json > .tmp-clawhub-inspect.json
          node <<'NODE'
          const fs = require("fs");
          const raw = fs.readFileSync(".tmp-clawhub-inspect.json", "utf8");
          const jsonStart = raw.indexOf("{");
          if (jsonStart === -1) {
            throw new Error("ClawHub inspect did not return JSON");
          }
          const detail = JSON.parse(raw.slice(jsonStart));
          const version = detail.version;
          if (!version) {
            throw new Error("ClawHub inspect is missing version metadata");
          }
          if (
            version.sha256hash !== null &&
            version.sha256hash !== undefined &&
            (typeof version.sha256hash !== "string" || !/^[a-f0-9]{64}$/i.test(version.sha256hash))
          ) {
            throw new Error("ClawHub version metadata has an invalid sha256hash");
          }
          if (!Array.isArray(version.files) || version.files.length === 0) {
            throw new Error("ClawHub version metadata is missing files[]");
          }
          const manifest = version.files.find((file) => file.path === "openclaw.plugin.json");
          if (!manifest || typeof manifest.sha256 !== "string" || !/^[a-f0-9]{64}$/i.test(manifest.sha256)) {
            throw new Error("ClawHub files[] is missing openclaw.plugin.json with sha256");
          }
          if (
            !version.artifact ||
            typeof version.artifact.sha256 !== "string" ||
            !/^[a-f0-9]{64}$/i.test(version.artifact.sha256)
          ) {
            throw new Error("ClawHub version metadata is missing artifact.sha256");
          }
          NODE
          tmp_dir="$(mktemp -d)"
          trap 'rm -rf "$tmp_dir"' EXIT
          cd "$tmp_dir"
          timeout 300s env npm_config_yes=true npx --yes "openclaw@$OPENCLAW_VERIFY_VERSION" plugins install "clawhub:zeroapi@${{ steps.version.outputs.value }}" \
            --dangerously-force-unsafe-install
