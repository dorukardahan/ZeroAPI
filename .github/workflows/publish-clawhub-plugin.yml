name: Publish ClawHub Plugin

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: zeroapi-publish-clawhub-plugin
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    env:
      CLAWHUB_TOKEN: ${{ secrets.CLAWHUB_TOKEN }}
      CLAWHUB_CLI_VERSION: "0.9.0"
      OPENCLAW_VERIFY_VERSION: "latest"
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: "22"

      - name: Read package version
        id: version
        run: |
          VERSION="$(node -p "require('./plugin/package.json').version")"
          echo "value=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Stage runtime plugin package
        run: node scripts/stage_clawhub_plugin.mjs .tmp-clawhub-plugin

      - name: Skip when ClawHub token is not configured
        if: ${{ env.CLAWHUB_TOKEN == '' }}
        run: echo "CLAWHUB_TOKEN secret is not configured. Skipping ClawHub plugin publish."

      - name: Publish plugin package
        if: ${{ env.CLAWHUB_TOKEN != '' }}
        run: |
          npx --yes "clawhub@$CLAWHUB_CLI_VERSION" login --token "$CLAWHUB_TOKEN" --no-browser
          set +e
          npx --yes "clawhub@$CLAWHUB_CLI_VERSION" package publish .tmp-clawhub-plugin \
            --family code-plugin \
            --name zeroapi \
            --display-name "ZeroAPI Router" \
            --version "${{ steps.version.outputs.value }}" \
            --changelog "Publish ZeroAPI ${{ steps.version.outputs.value }}" \
            --source-repo dorukardahan/ZeroAPI \
            --source-commit "$GITHUB_SHA" \
            --source-ref "$GITHUB_REF_NAME" \
            --source-path "plugin" 2>&1 | tee .tmp-clawhub-publish.log
          status="${PIPESTATUS[0]}"
          set -e
          if [ "$status" -ne 0 ]; then
            if grep -Eiq 'already exists|version .* exists|duplicate' .tmp-clawhub-publish.log; then
              echo "ClawHub package version already exists; continuing to verification."
            else
              exit "$status"
            fi
          fi

      - name: Verify ClawHub package is downloadable
        if: ${{ env.CLAWHUB_TOKEN != '' }}
        run: |
          tmp_dir="$(mktemp -d)"
          trap 'rm -rf "$tmp_dir"' EXIT
          cd "$tmp_dir"
          for attempt in $(seq 1 10); do
            if timeout 300s env npm_config_yes=true npx --yes "openclaw@$OPENCLAW_VERIFY_VERSION" plugins install "clawhub:zeroapi@${{ steps.version.outputs.value }}" \
              --dangerously-force-unsafe-install; then
              exit 0
            fi
            if [ "$attempt" -eq 10 ]; then
              echo "OpenClaw could not install the ClawHub package after retries."
              exit 1
            fi
            echo "OpenClaw install smoke test failed; retrying in 15s ($attempt/10)."
            sleep 15
          done
