name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      matrix:
        node-version: [20, 22]
    steps:
      # First-party actions pinned to immutable commit SHAs (a moved/compromised
      # major tag could run unreviewed code on jobs holding GITHUB_TOKEN). The
      # github-actions Dependabot config (.github/dependabot.yml) bumps these.
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ matrix.node-version }}
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.12'
      - run: python -m pip install -r integrations/hermes/requirements-test.txt
      - run: npm ci
      - run: npm run audit:ci
