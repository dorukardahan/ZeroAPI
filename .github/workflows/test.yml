name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      matrix:
        node-version: [20, 22]
    steps:
      # First-party actions pinned to immutable commit SHAs (a moved/compromised
      # major tag could run unreviewed code on jobs holding GITHUB_TOKEN). The
      # github-actions Dependabot config (.github/dependabot.yml) bumps these.
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: ${{ matrix.node-version }}
      - uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: '3.12'
      - run: python -m pip install -r integrations/hermes/requirements-test.txt
      - run: npm ci
      - run: npm run audit:ci
